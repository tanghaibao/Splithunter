name: CI

on:
  push:
    branches: [main, modernize, pysam-port]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install htslib build deps
        run: sudo apt-get update && sudo apt-get install -y
          libbz2-dev liblzma-dev libcurl4-openssl-dev zlib1g-dev clang

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install "maturin>=1.5,<2.0" pytest pysam pandas rdata

      - name: Build extension (editable) + link libz
        run: |
          . .venv/bin/activate
          maturin develop --release

      - name: Rust unit tests
        working-directory: rust
        run: cargo test --release

      - name: Python unit tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v
